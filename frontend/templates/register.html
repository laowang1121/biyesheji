<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 电脑配置推荐系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-box">
        <h1>用户注册</h1>
        <div id="msg" class="msg hidden"></div>
        <form id="regForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" required minlength="3" placeholder="至少3个字符">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required placeholder="请输入密码">
            </div>
            <button type="submit" class="btn">注册</button>
        </form>
        <div class="link">已有账号？<a href="{{ url_for('login_page') }}">立即登录</a></div>
    </div>
    <script>
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const res = await fetch('/api/register', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: fd.get('username'), password: fd.get('password') })
            }).then(r => r.json());
            const msgEl = document.getElementById('msg');
            if (res.success) {
                msgEl.textContent = '注册成功，请登录';
                msgEl.className = 'msg ok';
                msgEl.classList.remove('hidden');
                setTimeout(() => location.href = '/login', 1500);
            } else {
                msgEl.textContent = res.msg || '注册失败';
                msgEl.className = 'msg err';
                msgEl.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
